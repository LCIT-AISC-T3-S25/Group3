version: '3.8'

services:
  cnn_cv_app:
    build:
      context: ./cnn_cv_app
    container_name: cnn_cv_app
    ports:
      - "8001:8000"

  gru_nlp_app:
    build:
      context: ./gru_nlp_app
    container_name: gru_nlp_app
    ports:
      - "8002:5000"

  lstm_nlp_app:
    build:
      context: ./lstm_nlp_app
    container_name: lstm_nlp_app
    ports:
      - "8003:5000"

  vgg_cv_app:
    build:
      context: ./vgg_cv_app
    container_name: vgg_cv_app
    ports:
      - "8004:5000"

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: nextjs_frontend
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - cnn_cv_app
      - gru_nlp_app
      - lstm_nlp_app
      - vgg_cv_app
